{% extends "base.html" %}

{% block content %}
<div class="mb-8">
    <h2 class="text-4xl font-bold text-gray-800 mb-2">Share Your Recipe</h2>
    <p class="text-gray-600">Share your culinary creations with your cookbook!</p>
</div>

<form method="POST" action="{{ url_for('share_recipe') }}" class="bg-white p-8 rounded-xl shadow-lg space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="md:col-span-2">
            <label for="title" class="block text-sm font-bold text-gray-700 mb-2">Recipe Title</label>
            <input type="text" id="title" name="title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cozy-primary focus:border-transparent outline-none transition" placeholder="e.g. Classic Sourdough">
        </div>
        <div>
            <label for="category" class="block text-sm font-bold text-gray-700 mb-2">Category</label>
            <input type="text" id="category" name="category" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cozy-primary focus:border-transparent outline-none transition" placeholder="e.g. Bread, Dessert">
        </div>
        <div class="grid grid-cols-3 gap-4">
            <div>
                <label for="prep_time" class="block text-sm font-bold text-gray-700 mb-2">Prep (m)</label>
                <input type="number" id="prep_time" name="prep_time" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cozy-primary focus:border-transparent outline-none transition" value="0">
            </div>
            <div>
                <label for="cook_time" class="block text-sm font-bold text-gray-700 mb-2">Cook (m)</label>
                <input type="number" id="cook_time" name="cook_time" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cozy-primary focus:border-transparent outline-none transition" value="0">
            </div>
            <div>
                <label for="servings" class="block text-sm font-bold text-gray-700 mb-2">Servings</label>
                <input type="number" id="servings" name="servings" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cozy-primary focus:border-transparent outline-none transition" value="1">
            </div>
        </div>
        <div class="md:col-span-2">
            <label for="description" class="block text-sm font-bold text-gray-700 mb-2">Short Description</label>
            <textarea id="description" name="description" required rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cozy-primary focus:border-transparent outline-none transition" placeholder="A brief description..."></textarea>
        </div>
        <div class="md:col-span-2">
            <label for="image_url" class="block text-sm font-bold text-gray-700 mb-2">Image URL (Optional)</label>
            <input type="text" id="image_url" name="image_url" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cozy-primary focus:border-transparent outline-none transition" placeholder="https://...">
        </div>
        <div class="md:col-span-2">
            <label for="ingredients" class="block text-sm font-bold text-gray-700 mb-2">Ingredients</label>
            <textarea id="ingredients" name="ingredients" required rows="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cozy-primary focus:border-transparent outline-none transition" placeholder="List ingredients..."></textarea>
        </div>
        <div class="md:col-span-2">
            <label for="instructions" class="block text-sm font-bold text-gray-700 mb-2">Instructions</label>
            <textarea id="instructions" name="instructions" required rows="8" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cozy-primary focus:border-transparent outline-none transition" placeholder="Step-by-step..."></textarea>
        </div>
    </div>
    <div class="flex gap-4 pt-4">
        <button type="submit" class="bg-cozy-primary hover:bg-orange-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">Share Recipe</button>
        <a href="{{ url_for('cookbook') }}" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg transition-colors">Cancel</a>
    </div>
</form>
{% endblock %}
